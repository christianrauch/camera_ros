name: colcon

on:
  push:
  pull_request:
    paths-ignore:
      - "README.md"

jobs:
  build:
    name: "${{ matrix.distribution }} (${{ matrix.ros }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # - distribution: ubuntu
          #   version: 22.04
          #   ros: humble

          # - distribution: ubuntu
          #   version: 24.04
          #   ros: jazzy

          - distribution: almalinux
            version: 8
            ros: humble

          # - distribution: almalinux
          #   version: 9
          #   ros: jazzy

    continue-on-error: ${{ matrix.ros == 'rolling' }}

    container:
      image: ${{ matrix.distribution }}:${{ matrix.version }}
      env:
        PIP_BREAK_SYSTEM_PACKAGES: 1

    steps:
      # act workaround
      - if: ${{ matrix.distribution == 'ubuntu' }}
        run: |
          apt update
          apt -y install nodejs
      - if: ${{ matrix.distribution == 'almalinux'}}
        run: |
          dnf -y module enable nodejs:20
          dnf -y install nodejs

      - name: install ROS 2
        uses: ros-tooling/setup-ros@v0.7

      - name: build and test dependencies (almalinux)
        if: ${{ matrix.distribution == 'almalinux'}}
        run: |
          dnf -y install libasan python3-mypy

      - name: build and test
        uses: ros-tooling/action-ros-ci@v0.3
        with:
          package-name: camera_ros
          target-ros2-distro: ${{ matrix.ros }}
